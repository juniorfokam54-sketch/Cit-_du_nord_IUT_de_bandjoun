<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview Image Generator - Cités Étudiantes du Nord</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
      padding: 40px;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .logo {
      font-size: 4em;
      font-weight: bold;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .subtitle {
      font-size: 1.5em;
      margin-bottom: 30px;
      opacity: 0.9;
    }
    .description {
      max-width: 600px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .badge {
      background: rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 25px;
      display: inline-block;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="logo">🏠 CITÉS ÉTUDIANTES</div>
  <div class="subtitle">Guide des Résidences Universitaires du Nord</div>
  <div class="description">
    Découvrez un éventail complet de cités étudiantes offrant des environnements adaptés aux besoins des étudiants. Galeries photos, descriptions détaillées et informations pratiques.
  </div>
  <div class="badge">Nord Cameroun • Résidences Universitaires</div>
</body>
</html>
